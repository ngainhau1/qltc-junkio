name: Junkio CI/CD Pipeline

# GHI CHÚ HỌC TẬP - Phần hạ tầng của Thành Đạt:
# Quy trình này tự kiểm tra code khi có push hoặc pull request vào main/dev.
# Luồng chính: cài thư viện -> lint -> test -> build frontend.

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      # Chạy trên 2 phiên bản Node để phát hiện lỗi phụ thuộc môi trường sớm hơn.
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: |
          backend/package.json
          frontend/package.json

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install --no-package-lock

    - name: Run Backend Lint
      # Kiểm tra cú pháp và quy ước code backend trước khi chạy test.
      run: |
        cd backend
        npm run lint

    - name: Run Backend Tests
      # Chạy kiểm thử backend để phát hiện lỗi nghiệp vụ sớm.
      run: |
        cd backend
        npm run test

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install --no-package-lock

    - name: Run Frontend Lint
      # Kiểm tra code React, hooks và các lỗi JavaScript phổ biến.
      run: |
        cd frontend
        npm run lint

    - name: Run Frontend Tests
      # Chạy kiểm thử giao diện ở mức đơn vị.
      run: |
        cd frontend
        npm run test

    - name: Build Frontend
      # Build là bước xác nhận giao diện có thể đóng gói để triển khai.
      run: |
        cd frontend
        npm run build
