
services:
  # --- DỊCH VỤ 1: DATABASE (POSTGRESQL) ---
  db:
    image: postgres:15-alpine
    container_name: junkio_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- DỊCH VỤ 2: BACKEND (NODEJS) ---
  api:
    build: ./backend
    container_name: junkio_api
    ports:
      - "5000:5000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      PORT: ${PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      VITE_FRONTEND_URL: ${VITE_FRONTEND_URL}
      AUTO_SEED: ${AUTO_SEED}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # --- DỊCH VỤ 3: FRONTEND (REACT + NGINX) ---
  web:
    build: ./frontend
    container_name: junkio_web
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- DỊCH VỤ 4: REDIS CACHE ---
  redis:
    image: redis:7-alpine
    container_name: junkio_cache
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
