  /api/market/gold/history:
    get:
      summary: Load the cached SJC gold price history for the dashboard chart
      description: >-
        Returns the locally stored SJC history for the selected range. Live
        snapshots take precedence over demo-seeded points at the same timestamp.
      tags:
        - Market
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: range
          required: true
          schema:
            type: string
            enum:
              - 24H
              - 7D
      responses:
        '200':
          description: Gold price history loaded successfully
        '400':
          description: Invalid history range
        '500':
          description: Gold price history failed to load
  /api/notifications:
    get:
      summary: Lấy danh sách thông báo của tôi
      description: >
        Trả về tối đa **50 thông báo** mới nhất của người dùng hiện tại.

        Mỗi thông báo bao gồm: loại, nội dung, trạng thái đã đọc, thời gian.


        Frontend dùng API này để hiển thị badge số thông báo chưa đọc và danh
        sách popup.
      tags:
        - Notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách thông báo
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    type:
                      type: string
                    message:
                      type: string
                    isRead:
                      type: boolean
                    created_at:
                      type: string
                      format: date-time
              example:
                - id: n1a2b3c4-...
                  type: BUDGET_WARNING
                  message: Bạn đã chi 85% ngân sách Ăn uống tháng này
                  isRead: false
                  created_at: '2026-03-30T08:00:00.000Z'
                - id: n2b3c4d5-...
                  type: GOAL_ACHIEVED
                  message: Chúc mừng! Mục tiêu Mua laptop đã hoàn thành
                  isRead: true
                  created_at: '2026-03-29T15:30:00.000Z'
  /api/notifications/read-all:
    put:
      summary: Đánh dấu tất cả thông báo đã đọc
      description: |
        Đánh dấu toàn bộ thông báo chưa đọc thành đã đọc.
        Thường được gọi khi người dùng mở dropdown thông báo.
      tags:
        - Notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Đánh dấu tất cả đã đọc thành công
          content:
            application/json:
              example:
                msg: All notifications marked as read
  /api/notifications/{id}/read:
    put:
      summary: Đánh dấu một thông báo cụ thể đã đọc
      description: |
        Đánh dấu một thông báo đã đọc theo UUID.
        Chỉ có thể đánh dấu thông báo thuộc về chính mình.
      tags:
        - Notifications
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của thông báo
      responses:
        '200':
          description: Đánh dấu đã đọc thành công
          content:
            application/json:
              example:
                status: success
                message: Đã đánh dấu đã đọc
        '404':
          description: Không tìm thấy thông báo (NOTIFICATION_NOT_FOUND)
  /api/notifications/broadcast:
    post:
      summary: Gửi thông báo broadcast tới tất cả user (chỉ admin)
      description: >
        Gửi một thông báo đến **toàn bộ** người dùng trên hệ thống.

        Chỉ tài khoản có quyền **admin** mới được phép sử dụng.


        Hữu ích cho: thông báo bảo trì, cập nhật tính năng mới, cảnh báo hệ
        thống.
      tags:
        - Notifications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  example: Hệ thống sẽ bảo trì vào 22:00 tối nay
                  description: Nội dung thông báo
                type:
                  type: string
                  example: SYSTEM
                  description: Loại thông báo (mặc định SYSTEM)
            example:
              message: Hệ thống sẽ bảo trì vào 22:00 tối nay. Vui lòng lưu dữ liệu.
              type: SYSTEM
      responses:
        '200':
          description: Đã gửi broadcast thành công
          content:
            application/json:
              example:
                status: success
                message: Đã gửi broadcast tới tất cả user
        '403':
          description: Chỉ admin mới có quyền gửi broadcast
  /api/recurring:
    get:
      summary: Lấy danh sách mẫu giao dịch định kỳ
      description: >
        Trả về tất cả mẫu giao dịch định kỳ của người dùng hiện tại.

        Mỗi mẫu hiển thị: số tiền, tần suất, ngày chạy tiếp theo, trạng thái
        hoạt động.
      tags:
        - Recurring
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách giao dịch định kỳ thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    amount:
                      type: number
                    frequency:
                      type: string
                      enum:
                        - DAILY
                        - WEEKLY
                        - MONTHLY
                        - YEARLY
                    next_run_date:
                      type: string
                      format: date
                    is_active:
                      type: boolean
              example:
                - id: r1a2b3c4-...
                  amount: 300000
                  type: EXPENSE
                  description: Tiền điện hàng tháng
                  frequency: MONTHLY
                  next_run_date: '2026-04-01'
                  is_active: true
                - id: r2b3c4d5-...
                  amount: 25000000
                  type: INCOME
                  description: Lương tháng
                  frequency: MONTHLY
                  next_run_date: '2026-04-28'
                  is_active: true
    post:
      summary: Tạo mẫu giao dịch định kỳ mới
      description: >
        Thiết lập một giao dịch tự động lặp lại theo chu kỳ.


        **Tần suất hỗ trợ:**

        - `DAILY`: Hàng ngày

        - `WEEKLY`: Hàng tuần

        - `MONTHLY`: Hàng tháng (phổ biến nhất)

        - `YEARLY`: Hàng năm


        Hệ thống sẽ tự động tạo giao dịch vào `next_run_date` và cập nhật ngày
        chạy tiếp theo.
      tags:
        - Recurring
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - wallet_id
                - amount
                - frequency
                - next_run_date
              properties:
                wallet_id:
                  type: string
                  format: uuid
                  description: UUID ví thực hiện giao dịch
                category_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: UUID danh mục (tùy chọn)
                amount:
                  type: number
                  example: 300000
                  description: Số tiền mỗi lần (VND)
                type:
                  type: string
                  enum:
                    - INCOME
                    - EXPENSE
                  default: EXPENSE
                  description: Loại giao dịch
                description:
                  type: string
                  example: Tiền điện hàng tháng
                  description: Mô tả giao dịch
                frequency:
                  type: string
                  enum:
                    - DAILY
                    - WEEKLY
                    - MONTHLY
                    - YEARLY
                  example: MONTHLY
                  description: Tần suất lặp lại
                next_run_date:
                  type: string
                  format: date
                  example: '2026-04-01'
                  description: Ngày chạy tiếp theo (YYYY-MM-DD)
            example:
              wallet_id: w1a2b3c4-...
              amount: 300000
              type: EXPENSE
              description: Tiền điện hàng tháng
              frequency: MONTHLY
              next_run_date: '2026-04-01'
      responses:
        '201':
          description: Tạo mẫu định kỳ thành công
          content:
            application/json:
              example:
                status: success
                message: Tạo giao dịch định kỳ thành công
        '400':
          description: Thiếu trường bắt buộc hoặc dữ liệu không hợp lệ
  /api/recurring/trigger-cron:
    post:
      summary: Kích hoạt xử lý giao dịch định kỳ ngay lập tức
      description: >
        Chạy ngay lập tức job cron xử lý các giao dịch định kỳ đến hạn.

        API này thường được gọi tự động bởi hệ thống cron,

        nhưng cũng có thể kích hoạt thủ công để debug hoặc test.


        Job sẽ quét tất cả mẫu có `is_active = true` và `next_run_date <=
        today`,

        tạo giao dịch tương ứng và cập nhật `next_run_date` cho chu kỳ tiếp
        theo.
      tags:
        - Recurring
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Kết quả chạy cron
          content:
            application/json:
              example:
                message: Đã chạy thành công 3 giao dịch định kỳ.
  /api/recurring/{id}:
    put:
      summary: Cập nhật mẫu giao dịch định kỳ
      description: >
        Thay đổi số tiền, tần suất, trạng thái hoặc ngày chạy của một mẫu định
        kỳ.

        Chỉ gửi các field muốn cập nhật.


        **Tạm dừng:** Gửi `is_active: false` để tạm ngừng (không xóa).
      tags:
        - Recurring
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của mẫu định kỳ
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                frequency:
                  type: string
                  enum:
                    - DAILY
                    - WEEKLY
                    - MONTHLY
                    - YEARLY
                is_active:
                  type: boolean
                next_run_date:
                  type: string
                  format: date
                description:
                  type: string
            example:
              amount: 350000
              description: Tiền điện (đã tăng)
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              example:
                status: success
                message: Cập nhật giao dịch định kỳ thành công
        '404':
          description: Không tìm thấy mẫu định kỳ (RECURRING_NOT_FOUND)
    delete:
      summary: Xóa mẫu giao dịch định kỳ
      description: |
        Xóa vĩnh viễn một mẫu giao dịch định kỳ.
        Các giao dịch đã tạo trước đó **không bị ảnh hưởng** (vẫn được lưu).
        Chỉ ngừng tạo giao dịch mới trong tương lai.
      tags:
        - Recurring
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của mẫu định kỳ cần xóa
      responses:
        '200':
          description: Xóa thành công
          content:
            application/json:
              example:
                status: success
                message: Xóa giao dịch định kỳ thành công
        '404':
          description: Không tìm thấy mẫu định kỳ (RECURRING_NOT_FOUND)
  /api/transactions:
    get:
      summary: Lấy danh sách giao dịch có phân trang và bộ lọc
      description: >
        Trả về danh sách giao dịch của người dùng hiện tại, hỗ trợ nhiều bộ lọc:

        - **Context**: Xem giao dịch cá nhân (`personal`) hoặc gia đình
        (`family`)

        - **Loại giao dịch**: INCOME, EXPENSE, TRANSFER_IN, TRANSFER_OUT

        - **Khoảng thời gian**: Lọc theo ngày bắt đầu / kết thúc

        - **Ví cụ thể**: Lọc theo wallet_id

        - **Danh mục**: Lọc theo category_id

        - **Tìm kiếm**: Tìm theo mô tả giao dịch


        Kết quả có phân trang, mặc định 10 bản ghi mỗi trang.
      tags:
        - Transactions
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: context
          schema:
            type: string
            enum:
              - personal
              - family
          description: Chọn ngữ cảnh dữ liệu cần xem (cá nhân hoặc gia đình)
        - in: query
          name: family_id
          schema:
            type: string
            format: uuid
          description: ID gia đình (bắt buộc khi context = family)
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Số trang hiện tại (bắt đầu từ 1)
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Số giao dịch mỗi trang
        - in: query
          name: type
          schema:
            type: string
            enum:
              - INCOME
              - EXPENSE
              - TRANSFER_IN
              - TRANSFER_OUT
          description: Lọc theo loại giao dịch
        - in: query
          name: startDate
          schema:
            type: string
            format: date
          description: Ngày bắt đầu lọc (YYYY-MM-DD)
        - in: query
          name: endDate
          schema:
            type: string
            format: date
          description: Ngày kết thúc lọc (YYYY-MM-DD)
        - in: query
          name: wallet_id
          schema:
            type: string
            format: uuid
          description: Lọc theo ID ví cụ thể
        - in: query
          name: category_id
          schema:
            type: string
            format: uuid
          description: Lọc theo danh mục thu/chi
        - in: query
          name: search
          schema:
            type: string
          description: Tìm kiếm theo từ khóa trong mô tả giao dịch
      responses:
        '200':
          description: Danh sách giao dịch thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      transactions:
                        type: array
                        items:
                          type: object
                      totalItems:
                        type: integer
                      totalPages:
                        type: integer
                      currentPage:
                        type: integer
              example:
                status: success
                message: Lấy danh sách giao dịch thành công
                data:
                  transactions:
                    - id: t1a2b3c4-5678-9abc-def0-123456789001
                      amount: 150000
                      type: EXPENSE
                      description: Cà phê buổi sáng
                      date: '2026-03-30'
                      wallet_id: w1a2b3c4-...
                      category_id: c1a2b3c4-...
                    - id: t1a2b3c4-5678-9abc-def0-123456789002
                      amount: 25000000
                      type: INCOME
                      description: Lương tháng 3
                      date: '2026-03-28'
                      wallet_id: w1a2b3c4-...
                      category_id: null
                  totalItems: 342
                  totalPages: 35
                  currentPage: 1
    post:
      summary: Tạo giao dịch mới (thu nhập hoặc chi tiêu)
      description: >
        Ghi nhận một giao dịch thu nhập hoặc chi tiêu mới vào ví.


        **Yêu cầu:**

        - Phải có ít nhất một ví hợp lệ trước khi tạo giao dịch

        - `wallet_id` phải là ví mà bạn sở hữu hoặc có quyền truy cập (ví gia
        đình)

        - Khi tạo giao dịch EXPENSE, số dư ví phải đủ


        **Luồng xử lý:**

        - INCOME: Tự động cộng `amount` vào số dư ví

        - EXPENSE: Tự động trừ `amount` khỏi số dư ví
      tags:
        - Transactions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - wallet_id
                - amount
                - type
                - date
              properties:
                wallet_id:
                  type: string
                  format: uuid
                  description: ID ví thực hiện giao dịch
                amount:
                  type: number
                  minimum: 0.01
                  example: 150000
                  description: Số tiền giao dịch (phải lớn hơn 0)
                type:
                  type: string
                  enum:
                    - INCOME
                    - EXPENSE
                  example: EXPENSE
                  description: Loại giao dịch
                description:
                  type: string
                  example: Cà phê buổi sáng
                  description: Mô tả giao dịch (tùy chọn)
                category_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: ID danh mục (tùy chọn)
                date:
                  type: string
                  format: date
                  example: '2026-03-30'
                  description: Ngày giao dịch (YYYY-MM-DD)
            examples:
              chi_tieu:
                summary: Ghi nhận chi tiêu
                value:
                  wallet_id: w1a2b3c4-5678-9abc-def0-123456789001
                  amount: 150000
                  type: EXPENSE
                  description: Cà phê buổi sáng
                  date: '2026-03-30'
              thu_nhap:
                summary: Ghi nhận thu nhập
                value:
                  wallet_id: w1a2b3c4-5678-9abc-def0-123456789001
                  amount: 25000000
                  type: INCOME
                  description: Lương tháng 3/2026
                  date: '2026-03-28'
      responses:
        '201':
          description: Tạo giao dịch thành công
          content:
            application/json:
              example:
                status: success
                message: Tạo giao dịch thành công
                data:
                  id: t1a2b3c4-new-transaction-id
                  amount: 150000
                  type: EXPENSE
                  description: Cà phê buổi sáng
                  wallet_balance: 9850000
        '400':
          description: Chưa có ví hoặc số dư không đủ (INSUFFICIENT_BALANCE)
        '422':
          description: Dữ liệu body không hợp lệ
  /api/transactions/transfer:
    post:
      summary: Chuyển tiền giữa hai ví
      description: >
        Thực hiện chuyển tiền từ ví nguồn sang ví đích.

        Hệ thống tự động tạo 2 giao dịch liên kết:

        - **TRANSFER_OUT** trên ví nguồn (trừ tiền)

        - **TRANSFER_IN** trên ví đích (cộng tiền)


        Cả hai ví phải thuộc quyền quản lý của user (ví cá nhân hoặc ví gia
        đình).

        Hai giao dịch được liên kết bằng `transfer_group_id` để dễ truy vết.
      tags:
        - Transactions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from_wallet_id
                - to_wallet_id
                - amount
              properties:
                from_wallet_id:
                  type: string
                  format: uuid
                  description: ID ví nguồn (trừ tiền)
                to_wallet_id:
                  type: string
                  format: uuid
                  description: ID ví đích (cộng tiền)
                amount:
                  type: number
                  minimum: 0.01
                  example: 5000000
                  description: Số tiền chuyển (phải nhỏ hơn hoặc bằng số dư ví nguồn)
                description:
                  type: string
                  example: Chuyển tiền tiết kiệm
                  description: Ghi chú chuyển khoản
                date:
                  type: string
                  format: date
                  description: Ngày chuyển khoản
            example:
              from_wallet_id: w-source-1234-...
              to_wallet_id: w-dest-5678-...
              amount: 5000000
              description: Chuyển sang ví tiết kiệm
      responses:
        '201':
          description: Chuyển tiền thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      transfer_group_id:
                        type: string
                        format: uuid
                      transfer_out_id:
                        type: string
                        format: uuid
                      transfer_in_id:
                        type: string
                        format: uuid
                      from_wallet_balance:
                        type: number
                      to_wallet_balance:
                        type: number
              example:
                status: success
                message: Chuyển tiền thành công
                data:
                  transfer_group_id: tg-a1b2c3d4-...
                  transfer_out_id: t-out-5678-...
                  transfer_in_id: t-in-9012-...
                  from_wallet_balance: 5000000
                  to_wallet_balance: 15000000
        '400':
          description: Ví không hợp lệ hoặc số dư không đủ (INSUFFICIENT_BALANCE)
  /api/transactions/import:
    post:
      summary: Nhập hàng loạt giao dịch (Bulk Import)
      description: |
        Cho phép nhập nhiều giao dịch cùng lúc trong một request.
        Hữu ích khi:
        - Chuyển dữ liệu từ ứng dụng khác sang Junkio
        - Nhập dữ liệu từ file Excel/CSV đã parse
        - Tự động hóa việc ghi nhận giao dịch

        **Lưu ý:** Mỗi giao dịch trong mảng sẽ được xử lý độc lập.
        Nếu một giao dịch lỗi, các giao dịch khác vẫn được tạo thành công.
      tags:
        - Transactions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transactions
              properties:
                transactions:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - wallet_id
                      - amount
                      - type
                      - date
                    properties:
                      wallet_id:
                        type: string
                        format: uuid
                      amount:
                        type: number
                      type:
                        type: string
                        enum:
                          - INCOME
                          - EXPENSE
                      description:
                        type: string
                      category_id:
                        type: string
                        format: uuid
                        nullable: true
                      date:
                        type: string
                        format: date
            example:
              transactions:
                - wallet_id: w1a2b3c4-...
                  amount: 50000
                  type: EXPENSE
                  description: Grab đi làm
                  date: '2026-03-28'
                - wallet_id: w1a2b3c4-...
                  amount: 200000
                  type: EXPENSE
                  description: Mua sách
                  date: '2026-03-29'
      responses:
        '200':
          description: Nhập dữ liệu thành công
          content:
            application/json:
              example:
                status: success
                message: Nhập 2 giao dịch thành công
        '400':
          description: Body request rỗng hoặc bạn chưa có ví hợp lệ
  /api/transactions/export:
    get:
      summary: Xuất danh sách giao dịch ra file (CSV/PDF)
      description: >
        Tải xuống file chứa danh sách giao dịch theo bộ lọc hiện tại.

        Hỗ trợ 2 định dạng:

        - **CSV**: Phù hợp để mở bằng Excel, Google Sheets

        - **PDF**: Phù hợp để in hoặc chia sẻ báo cáo


        Các tham số lọc giống với API `GET /api/transactions` (context, type,
        date range...).

        Response trả về file binary, trình duyệt sẽ tự tải về.
      tags:
        - Transactions
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: format
          schema:
            type: string
            enum:
              - csv
              - pdf
            default: csv
          description: Định dạng file xuất (csv hoặc pdf)
        - in: query
          name: context
          schema:
            type: string
            enum:
              - personal
              - family
          description: Ngữ cảnh dữ liệu
        - in: query
          name: family_id
          schema:
            type: string
            format: uuid
          description: ID gia đình (khi context = family)
        - in: query
          name: startDate
          schema:
            type: string
            format: date
          description: Ngày bắt đầu (YYYY-MM-DD)
        - in: query
          name: endDate
          schema:
            type: string
            format: date
          description: Ngày kết thúc (YYYY-MM-DD)
        - in: query
          name: type
          schema:
            type: string
            enum:
              - INCOME
              - EXPENSE
              - TRANSFER_IN
              - TRANSFER_OUT
          description: Lọc theo loại giao dịch
        - in: query
          name: wallet_id
          schema:
            type: string
            format: uuid
          description: Lọc theo ví
        - in: query
          name: category_id
          schema:
            type: string
            format: uuid
          description: Lọc theo danh mục
        - in: query
          name: search
          schema:
            type: string
          description: Tìm kiếm theo mô tả
      responses:
        '200':
          description: File export được tạo thành công (tự động tải về)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /api/transactions/{id}:
    get:
      summary: Lấy chi tiết một giao dịch
      description: >
        Trả về thông tin đầy đủ của một giao dịch cụ thể.

        User chỉ có thể xem giao dịch thuộc ví mà mình sở hữu hoặc có quyền truy
        cập.


        Thông tin bao gồm: số tiền, loại, mô tả, ngày, ví liên quan, danh mục.
      tags:
        - Transactions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của giao dịch cần xem
      responses:
        '200':
          description: Chi tiết giao dịch thành công
          content:
            application/json:
              example:
                status: success
                message: Lấy chi tiết giao dịch thành công
                data:
                  id: t1a2b3c4-...
                  amount: 150000
                  type: EXPENSE
                  description: Cà phê buổi sáng
                  date: '2026-03-30'
                  wallet:
                    id: w1a2b3c4-...
                    name: Ví MB Bank
                  category:
                    id: c1a2b3c4-...
                    name: Ăn uống
        '404':
          description: Không tìm thấy giao dịch hoặc không có quyền (TRANSACTION_NOT_FOUND)
    delete:
      summary: Xóa giao dịch (tự động hoàn tác số dư ví)
      description: >
        Xóa một giao dịch và **tự động hoàn tác** số dư ví tương ứng:

        - Xóa giao dịch **EXPENSE**: Cộng lại tiền vào ví

        - Xóa giao dịch **INCOME**: Trừ tiền khỏi ví


        Hành động này không thể hoàn tác. Nếu cần, hãy tạo giao dịch mới để bù
        lại.
      tags:
        - Transactions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của giao dịch cần xóa
      responses:
        '200':
          description: Xóa giao dịch thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    nullable: true
              example:
                status: success
                message: Xóa giao dịch thành công
                data: null
        '404':
          description: Không tìm thấy giao dịch hoặc không có quyền (TRANSACTION_NOT_FOUND)
  /api/users/me:
    get:
      summary: Lấy thông tin hồ sơ cá nhân
      description: |
        Trả về đầy đủ thông tin profile của người dùng đang đăng nhập,
        bao gồm tên, email, role, và đường dẫn avatar.

        Đây là **canonical endpoint** (endpoint chính).
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lấy hồ sơ thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                      avatar:
                        type: string
                        nullable: true
                      role:
                        type: string
                        enum:
                          - member
                          - staff
                          - admin
              example:
                status: success
                message: Lấy profile thành công
                data:
                  id: b2df0d5d-1234-4abc-9def-bbbd02910001
                  name: Nguyễn Văn A
                  email: nguyenvana@junkio.com
                  avatar: /uploads/avatars/b2df0d5d-avatar.jpg
                  role: member
        '401':
          description: Chưa đăng nhập hoặc token hết hạn
        '404':
          description: Không tìm thấy user (USER_NOT_FOUND)
    put:
      summary: Cập nhật hồ sơ cá nhân
      description: |
        Cho phép người dùng thay đổi tên hiển thị và các thông tin cá nhân khác.
        Chỉ cần gửi các field muốn thay đổi, không bắt buộc gửi tất cả.

        **Lưu ý:** Không thể thay đổi email hoặc role qua API này.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Nguyễn Văn B
                  description: Tên hiển thị mới
            example:
              name: Nguyễn Văn B
      responses:
        '200':
          description: Cập nhật hồ sơ thành công
          content:
            application/json:
              example:
                status: success
                message: Cập nhật profile thành công
                data:
                  id: b2df0d5d-1234-4abc-9def-bbbd02910001
                  name: Nguyễn Văn B
                  email: nguyenvana@junkio.com
        '401':
          description: Chưa đăng nhập
    delete:
      summary: Xóa tài khoản vĩnh viễn
      description: >
        Xóa hoàn toàn tài khoản và tất cả dữ liệu liên quan (ví, giao dịch, mục
        tiêu...).

        Hành động này **không thể hoàn tác**.


        **Bảo mật:** Yêu cầu nhập đúng mật khẩu hiện tại để xác nhận.

        Đây là biện pháp chống xóa nhầm khi token bị đánh cắp.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  format: password
                  description: Mật khẩu hiện tại (để xác nhận xóa)
            example:
              password: myCurrentPassword123
      responses:
        '200':
          description: Xóa tài khoản thành công
          content:
            application/json:
              example:
                status: success
                message: Tài khoản đã được xóa vĩnh viễn
        '400':
          description: Mật khẩu không đúng (WRONG_PASSWORD)
  /api/users/me/avatar:
    post:
      summary: Cập nhật ảnh đại diện (avatar)
      description: |
        Upload hoặc thay thế ảnh đại diện của người dùng hiện tại.
        Đây là **canonical endpoint** (endpoint chính).

        **Yêu cầu file:**
        - Định dạng hỗ trợ: JPEG, JPG, PNG, GIF
        - Dung lượng tối đa: **5MB**
        - Tên field trong form-data: `avatar`

        Ảnh cũ sẽ tự động bị xóa khi upload ảnh mới.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: string
                  format: binary
                  description: File ảnh (JPEG/PNG/GIF, tối đa 5MB)
      responses:
        '200':
          description: Cập nhật avatar thành công
          content:
            application/json:
              example:
                status: success
                message: Cập nhật avatar thành công
                data:
                  avatar_url: /uploads/avatars/b2df0d5d-avatar-1711792000.jpg
        '400':
          description: File không hợp lệ (sai định dạng hoặc vượt quá 5MB)
  /api/users/me/password:
    put:
      summary: Đổi mật khẩu tài khoản
      description: >
        Cho phép người dùng thay đổi mật khẩu hiện tại.

        Yêu cầu nhập đúng mật khẩu hiện tại (`currentPassword`) để xác minh danh
        tính.


        **Yêu cầu mật khẩu mới:**

        - Tối thiểu 6 ký tự

        - Phải khác mật khẩu hiện tại


        Sau khi đổi thành công, token hiện tại vẫn hoạt động bình thường.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                  example: oldPassword123
                  description: Mật khẩu hiện tại (để xác minh)
                newPassword:
                  type: string
                  format: password
                  example: newPassword456
                  minLength: 6
                  description: Mật khẩu mới (tối thiểu 6 ký tự)
            example:
              currentPassword: oldPassword123
              newPassword: newPassword456
      responses:
        '200':
          description: Đổi mật khẩu thành công
          content:
            application/json:
              example:
                status: success
                message: Đổi mật khẩu thành công
        '400':
          description: Mật khẩu hiện tại sai hoặc mật khẩu mới quá ngắn (WRONG_PASSWORD)
  /api/wallets:
    get:
      summary: Lấy danh sách ví mà người dùng có quyền truy cập
      tags:
        - Wallets
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Trả về danh sách ví thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        balance:
                          type: number
                        currency:
                          type: string
                          example: VND
                        user_id:
                          type: string
                          format: uuid
                          nullable: true
                        family_id:
                          type: string
                          format: uuid
                          nullable: true
    post:
      summary: Tạo ví mới
      description: >-
        Bỏ qua \`family_id\` để tạo ví cá nhân. Gửi \`family_id\` để tạo ví gia
        đình trong gia đình mà bạn được phép quản lý.
      tags:
        - Wallets
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: Ví MB Bank
                balance:
                  type: number
                  example: 10000000
                currency:
                  type: string
                  enum:
                    - VND
                    - USD
                    - EUR
                  example: VND
                family_id:
                  type: string
                  format: uuid
                  nullable: true
            examples:
              personal:
                summary: Tạo ví cá nhân (Personal Wallet)
                value:
                  name: Ví Cá Nhân ACB
                  balance: 15000000
                  currency: VND
              family:
                summary: Tạo ví gia đình (Family Wallet)
                value:
                  name: Quỹ Sinh Hoạt Chung
                  balance: 5000000
                  currency: VND
                  family_id: 11111111-1111-1111-1111-111111111111
      responses:
        '201':
          description: Tạo ví mới thành công
        '409':
          description: Tên ví đã tồn tại trong cùng danh mục
        '422':
          description: Dữ liệu gửi lên không đúng định dạng
  /api/wallets/{id}:
    put:
      summary: Cập nhật thông tin ví
      tags:
        - Wallets
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Ví Lương Tháng
                balance:
                  type: number
                  example: 25000000
                currency:
                  type: string
                  enum:
                    - VND
                    - USD
                    - EUR
      responses:
        '200':
          description: Cập nhật ví thành công
        '404':
          description: Không tìm thấy ví tương ứng (WALLET_NOT_FOUND)
    delete:
      summary: Xóa ví vĩnh viễn
      tags:
        - Wallets
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Xóa ví thành công
        '404':
          description: Không tìm thấy ví
tags:
  - name: Admin
    description: |
      Quản trị hệ thống, chỉ dành cho tài khoản có role **admin**.
      Tất cả các endpoint trong nhóm này yêu cầu Bearer Token của admin.
      Nếu bạn chưa có quyền admin, hãy liên hệ quản trị viên hệ thống.
  - name: Analytics
    description: |
      Báo cáo và thống kê tài chính cá nhân.
      Cung cấp dữ liệu tổng quan (dashboard) và báo cáo chi tiết
      theo tháng/năm để người dùng theo dõi tình hình tài chính.
  - name: Auth
    description: >
      Xác thực người dùng và quản lý phiên đăng nhập.

      Nhóm API này bao gồm đăng ký, đăng nhập, làm mới token, đăng xuất

      và các chức năng khôi phục mật khẩu. Hầu hết các endpoint **không yêu cầu
      token**
  - name: Budgets
    description: >
      Quản lý ngân sách thu/chi theo danh mục và khoảng thời gian.

      Budget giúp người dùng đặt giới hạn chi tiêu cho từng danh mục

      (VD: Ăn uống tối đa 3 triệu/tháng). Hỗ trợ cả ngân sách cá nhân và gia
      đình.
  - name: Categories
    description: |
      Quản lý danh mục thu/chi.
      Danh mục dùng để phân loại giao dịch (VD: Ăn uống, Di chuyển, Lương...).
      Hỗ trợ danh mục cha-con (parent_id) để tổ chức phân cấp.
  - name: Debts
    description: |
      Quản lý chia sẻ chi phí và nợ trong nhóm gia đình.
      Khi một thành viên gia đình tạo giao dịch chi tiêu chung,
      hệ thống tự động chia đều cho các thành viên và tạo khoản nợ.
      Mỗi thành viên có thể tất toán khoản nợ của chính mình.
  - name: Families
    description: >
      Quản lý nhóm gia đình và thành viên.

      Gia đình cho phép nhiều người dùng chia sẻ ví chung, theo dõi chi tiêu
      chung,

      và phân chia nợ trong nhóm.
  - name: Forecast
    description: Forecast cashflow trends from the user's historical transactions.
  - name: Goals
    description: >
      Quản lý mục tiêu tài chính (tiết kiệm).

      Mục tiêu giúp người dùng theo dõi tiến độ tiết kiệm cho một mục đích cụ
      thể

      (VD: mua laptop, du lịch, quỹ khẩn cấp...).

      Người dùng có thể nạp tiền từ ví cá nhân vào mục tiêu.
  - name: Market
    description: Market data widgets and integrations for the authenticated dashboard.
  - name: Notifications
    description: >
      Quản lý thông báo hệ thống.

      Hệ thống tự động gửi thông báo khi có sự kiện quan trọng:

      vượt ngân sách, mục tiêu đạt được, khoản chia tiền mới, broadcast từ
      admin...
  - name: Recurring
    description: |
      Quản lý giao dịch định kỳ (tự động lặp lại).
      Cho phép người dùng thiết lập mẫu giao dịch tự động tạo theo chu kỳ:
      hàng ngày, hàng tuần, hàng tháng hoặc hàng năm.
      VD: Tiền điện hàng tháng, lương hàng tháng, tiền thuê nhà...
  - name: Transactions
    description: |
      Quản lý giao dịch thu chi, chuyển tiền, nhập và xuất dữ liệu.
      Đây là nhóm API trọng tâm của hệ thống, cho phép người dùng:
      - Ghi nhận thu nhập / chi tiêu hàng ngày
      - Chuyển tiền giữa các ví
      - Nhập hàng loạt giao dịch từ file
      - Xuất dữ liệu ra CSV/PDF
  - name: Users
    description: |
      Quản lý hồ sơ cá nhân của người dùng đang đăng nhập.
      Tất cả endpoint trong nhóm này yêu cầu Bearer Token.
      Đây là nhóm endpoint chính (canonical) cho profile, avatar, đổi mật khẩu.
  - name: Wallets
    description: Quản lý ví cá nhân và ví gia đình
