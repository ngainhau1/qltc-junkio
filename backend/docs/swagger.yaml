        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của danh mục cần cập nhật
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Tên mới của danh mục
                type:
                  type: string
                  enum:
                    - INCOME
                    - EXPENSE
                  description: Loại mới
                icon:
                  type: string
                  description: Icon mới
            example:
              name: Ăn vặt
              icon: Cookie
      responses:
        '200':
          description: Cập nhật danh mục thành công
          content:
            application/json:
              example:
                status: success
                message: Cập nhật danh mục thành công
        '404':
          description: Không tìm thấy danh mục (CATEGORY_NOT_FOUND)
    delete:
      summary: Xóa danh mục
      description: |
        Xóa vĩnh viễn một danh mục khỏi hệ thống.

        **Lưu ý:** Các giao dịch đã gắn danh mục này sẽ bị mất liên kết
        (category_id trở thành null). Nên kiểm tra trước khi xóa.
      tags:
        - Categories
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của danh mục cần xóa
      responses:
        '200':
          description: Xóa danh mục thành công
          content:
            application/json:
              example:
                status: success
                message: Xóa danh mục thành công
        '404':
          description: Không tìm thấy danh mục (CATEGORY_NOT_FOUND)
  /api/debts/settle:
    post:
      summary: Tất toán nợ qua chuyển khoản nội bộ
      description: >
        Thanh toán khoản nợ bằng cách chuyển tiền trực tiếp giữa 2 ví trong hệ
        thống.

        Hệ thống sẽ tạo 2 giao dịch (TRANSFER_OUT / TRANSFER_IN) và đánh dấu nợ
        đã thanh toán.


        **Yêu cầu:**

        - Ví nguồn (`from_wallet_id`) phải có đủ số dư

        - Với settle ngoài family, ví đích (`to_wallet_id`) phải thuộc người
        nhận thanh toán

        - Với settle trong family, backend tự suy ra ví nhận từ các share còn mở
      tags:
        - Debts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - to_user_id
                - amount
                - from_wallet_id
              properties:
                to_user_id:
                  type: string
                  format: uuid
                  description: UUID người nhận thanh toán
                from_user_id:
                  type: string
                  format: uuid
                  description: >-
                    Deprecated in family mode; debtor is derived from the
                    authenticated user
                amount:
                  type: number
                  example: 250000
                  description: Số tiền tất toán (VND)
                from_wallet_id:
                  type: string
                  format: uuid
                  description: UUID ví người trả (ví của bạn)
                to_wallet_id:
                  type: string
                  format: uuid
                  description: UUID ví người nhận. Chỉ bắt buộc ngoài family mode
                family_id:
                  type: string
                  format: uuid
                  description: Family id for member-to-member shared expense settlement
            example:
              to_user_id: u-receiver-1234-...
              amount: 250000
              from_wallet_id: w-my-wallet-...
              to_wallet_id: w-their-wallet-...
              family_id: family-1234-...
      responses:
        '200':
          description: Tất toán nợ thành công
          content:
            application/json:
              example:
                status: success
                message: Tất toán nợ thành công
        '400':
          description: Số dư không đủ hoặc dữ liệu không hợp lệ (INSUFFICIENT_BALANCE)
  /api/debts/simplified/{familyId}:
    get:
      summary: Gợi ý tối ưu thanh toán nợ trong gia đình
      description: >
        Sử dụng thuật toán Greedy để tính toán cách thanh toán nợ **tối ưu
        nhất**

        giữa các thành viên trong một gia đình. Giảm thiểu số lượng giao dịch
        cần thực hiện.


        **Ví dụ:** Nếu A nợ B 100k, B nợ C 100k -> Gợi ý: A chuyển thẳng cho C
        100k

        (giảm từ 2 giao dịch xuống 1).
      tags:
        - Debts
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: familyId
          required: true
          schema:
            type: string
            format: uuid
          description: UUID gia đình cần tối ưu nợ
      responses:
        '200':
          description: Danh sách gợi ý thanh toán tối ưu
          content:
            application/json:
              example:
                status: success
                data:
                  - from: Nguyễn Văn A
                    to: Trần Thị B
                    amount: 350000
                  - from: Lê Văn C
                    to: Trần Thị B
                    amount: 150000
  /api/families:
    get:
      summary: Lấy danh sách gia đình mà tôi tham gia
      description: |
        Trả về tất cả các nhóm gia đình mà người dùng hiện tại là thành viên
        (bao gồm cả gia đình do mình tạo và gia đình được mời vào).
      tags:
        - Families
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách gia đình thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    created_by:
                      type: string
              example:
                - id: f1a2b3c4-...
                  name: Gia đình Nguyễn
                  created_by: b2df0d5d-...
                - id: f2b3c4d5-...
                  name: Nhóm bạn thân
                  created_by: c3ef1e6e-...
    post:
      summary: Tạo nhóm gia đình mới
      description: >
        Tạo một nhóm gia đình mới. Người tạo tự động trở thành **ADMIN** của gia
        đình.

        Sau khi tạo, có thể mời thêm thành viên bằng email qua API thêm thành
        viên.
      tags:
        - Families
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: Gia đình Nguyễn
                  description: Tên nhóm gia đình
            example:
              name: Gia đình Nguyễn
      responses:
        '201':
          description: Tạo gia đình thành công
          content:
            application/json:
              example:
                status: success
                message: Tạo gia đình thành công
                data:
                  id: f-new-family-id
                  name: Gia đình Nguyễn
                  created_by: b2df0d5d-...
        '400':
          description: Dữ liệu không hợp lệ (thiếu tên)
  /api/families/{id}:
    get:
      summary: Xem chi tiết gia đình và danh sách thành viên
      description: |
        Trả về thông tin chi tiết của một gia đình, bao gồm:
        - Tên gia đình, người tạo
        - Danh sách tất cả thành viên (tên, email, vai trò trong gia đình)

        Chỉ thành viên của gia đình mới có quyền xem.
      tags:
        - Families
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của gia đình
      responses:
        '200':
          description: Chi tiết gia đình thành công
          content:
            application/json:
              example:
                status: success
                data:
                  id: f1a2b3c4-...
                  name: Gia đình Nguyễn
                  created_by: b2df0d5d-...
                  members:
                    - id: b2df0d5d-...
                      name: Nguyễn Văn A
                      email: nguyenvana@junkio.com
                      role: ADMIN
                    - id: c3ef1e6e-...
                      name: Nguyễn Thị B
                      email: nguyenthib@junkio.com
                      role: MEMBER
        '404':
          description: Gia đình không tồn tại (FAMILY_NOT_FOUND)
    delete:
      summary: Xóa gia đình vĩnh viễn
      description: |
        Xóa hoàn toàn nhóm gia đình và tất cả dữ liệu liên quan.
        Hành động này **không thể hoàn tác**.

        **Chỉ người tạo (owner)** gia đình mới có quyền xóa.
        Ví gia đình, giao dịch chung, ngân sách gia đình sẽ bị xóa theo.
      tags:
        - Families
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của gia đình cần xóa
      responses:
        '200':
          description: Xóa gia đình thành công
          content:
            application/json:
              example:
                status: success
                message: Xóa gia đình thành công
        '403':
          description: Chỉ người tạo mới có quyền xóa (NOT_FAMILY_OWNER)
        '404':
          description: Gia đình không tồn tại (FAMILY_NOT_FOUND)
  /api/families/{id}/members:
    post:
      summary: Thêm thành viên vào gia đình bằng email
      description: |
        Mời một người dùng khác vào gia đình bằng địa chỉ email.

        **Yêu cầu:**
        - Email phải thuộc về một tài khoản Junkio đã đăng ký
        - Người được mời chưa là thành viên của gia đình này
        - Người mời phải là ADMIN của gia đình

        **Vai trò trong gia đình:**
        - `ADMIN`: Có quyền quản lý thành viên, xóa gia đình
        - `MEMBER`: Thành viên thường, có quyền xem/tạo giao dịch chung
      tags:
        - Families
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của gia đình
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  example: member@junkio.com
                  description: Email của người muốn mời
                role:
                  type: string
                  enum:
                    - ADMIN
                    - MEMBER
                  default: MEMBER
                  description: Vai trò trong gia đình
            example:
              email: member@junkio.com
              role: MEMBER
      responses:
        '200':
          description: Thêm thành viên thành công
          content:
            application/json:
              example:
                status: success
                message: Thêm thành viên thành công
        '404':
          description: Gia đình hoặc user không tồn tại
        '409':
          description: User đã là thành viên của gia đình (MEMBER_EXISTS)
  /api/families/{id}/members/{userIdToRemove}:
    delete:
      summary: Xóa thành viên khỏi gia đình
      description: >
        Xóa một thành viên ra khỏi nhóm gia đình.


        **Quy tắc:**

        - Chỉ ADMIN gia đình mới có quyền xóa thành viên khác

        - Thành viên có thể tự rời gia đình bằng cách gửi `userIdToRemove` =
        chính mình

        - Không thể xóa người tạo (owner) ra khỏi gia đình
      tags:
        - Families
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của gia đình
        - in: path
          name: userIdToRemove
          required: true
          schema:
            type: string
            format: uuid
          description: UUID user cần xóa khỏi gia đình
      responses:
        '200':
          description: Xóa thành viên thành công
          content:
            application/json:
              example:
                status: success
                message: Xóa thành viên thành công
        '403':
          description: Chỉ admin gia đình mới có quyền xóa
        '404':
          description: Thành viên không tồn tại trong gia đình
  /api/forecast:
    get:
      summary: Load the standard forecast dataset
      description: >-
        Returns historical monthly income/expense totals plus forward-looking
        predictions.
      tags:
        - Forecast
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: months
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 12
          description: Number of future months to forecast
      responses:
        '200':
          description: Forecast loaded successfully
  /api/forecast/ml:
    get:
      summary: Load the AI/ML forecast dataset
      description: >-
        Uses simple linear regression on the last 6 months of transaction
        history.
      tags:
        - Forecast
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: months
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 12
          description: Number of future months to forecast
      responses:
        '200':
          description: ML forecast loaded successfully
          content:
            application/json:
              example:
                status: success
                message: FORECAST_ML_RETRIEVED
                data:
                  historical:
                    - month: 2026-01
                      income: 28000000
                      expense: 18500000
                  forecast:
                    - month: 2026-07
                      predictedIncome: 29000000
                      predictedExpense: 19500000
                      predictedNet: 9500000
                  warningMonth: null
                  model:
                    type: SIMPLE_LINEAR_REGRESSION
                    sourceMonths: 6
                    forecastMonths: 3
  /api/goals:
    get:
      summary: Lấy danh sách mục tiêu tài chính
      description: >
        Trả về tất cả mục tiêu của người dùng hiện tại,

        bao gồm cả mục tiêu cá nhân và mục tiêu gia đình (nếu có).

        Mỗi mục tiêu hiển thị: tên, số tiền mục tiêu, số tiền đã nạp, trạng
        thái, deadline.
      tags:
        - Goals
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách mục tiêu thành công
          content:
            application/json:
              example:
                status: success
                message: Lấy danh sách mục tiêu thành công
                data:
                  - id: g1a2b3c4-...
                    name: Mua laptop mới
                    targetAmount: 30000000
                    currentAmount: 12000000
                    status: IN_PROGRESS
                    deadline: '2026-12-31'
                    colorCode: '#16a34a'
                  - id: g2b3c4d5-...
                    name: Du lịch Đà Lạt
                    targetAmount: 10000000
                    currentAmount: 10000000
                    status: ACHIEVED
                    deadline: '2026-06-01'
                    colorCode: '#2563eb'
    post:
      summary: Tạo mục tiêu tiết kiệm mới
      description: |
        Tạo một mục tiêu tài chính mới để theo dõi tiến độ tiết kiệm.

        **Các trường:**
        - `name`: Tên mục tiêu (bắt buộc)
        - `targetAmount`: Số tiền mục tiêu cần đạt (bắt buộc, > 0)
        - `deadline`: Hạn chót (tùy chọn, định dạng YYYY-MM-DD)
        - `colorCode`: Mã màu hex hiển thị trên giao diện
        - `imageUrl`: Tên icon đại diện cho mục tiêu
      tags:
        - Goals
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - targetAmount
              properties:
                name:
                  type: string
                  example: Mua laptop mới
                  description: Tên mục tiêu
                targetAmount:
                  type: number
                  minimum: 0.01
                  example: 30000000
                  description: Số tiền mục tiêu (VND)
                deadline:
                  type: string
                  format: date
                  nullable: true
                  example: '2026-12-31'
                  description: Hạn chót (tùy chọn)
                colorCode:
                  type: string
                  example: '#16a34a'
                  description: Mã màu hex
                imageUrl:
                  type: string
                  example: Laptop
                  description: Tên icon
            example:
              name: Mua laptop mới
              targetAmount: 30000000
              deadline: '2026-12-31'
              colorCode: '#16a34a'
              imageUrl: Laptop
      responses:
        '201':
          description: Tạo mục tiêu thành công
          content:
            application/json:
              example:
                status: success
                message: Tạo mục tiêu thành công
                data:
                  id: g-new-goal-id
                  name: Mua laptop mới
                  targetAmount: 30000000
                  currentAmount: 0
                  status: IN_PROGRESS
        '422':
          description: Dữ liệu không hợp lệ (thiếu name hoặc targetAmount <= 0)
  /api/goals/{id}:
    put:
      summary: Cập nhật thông tin mục tiêu
      description: >
        Thay đổi tên, số tiền mục tiêu, deadline hoặc trạng thái của một mục
        tiêu.

        Chỉ gửi các field muốn cập nhật (partial update).


        **Trạng thái hợp lệ:**

        - `IN_PROGRESS`: Đang thực hiện

        - `ACHIEVED`: Đã hoàn thành (người dùng tự đánh dấu hoặc hệ thống tự
        chuyển khi đạt mục tiêu)
      tags:
        - Goals
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của mục tiêu
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                targetAmount:
                  type: number
                deadline:
                  type: string
                  format: date
                  nullable: true
                colorCode:
                  type: string
                imageUrl:
                  type: string
                status:
                  type: string
                  enum:
                    - IN_PROGRESS
                    - ACHIEVED
            example:
              name: Mua MacBook Pro M4
              targetAmount: 45000000
      responses:
        '200':
          description: Cập nhật mục tiêu thành công
          content:
            application/json:
              example:
                status: success
                message: Cập nhật mục tiêu thành công
        '404':
          description: Không tìm thấy mục tiêu (GOAL_NOT_FOUND)
    delete:
      summary: Xóa mục tiêu tiết kiệm
      description: >
        Xóa vĩnh viễn một mục tiêu. Hành động này không thể hoàn tác.


        **Lưu ý:** Số tiền đã nạp vào mục tiêu sẽ **không** được hoàn lại tự
        động.

        Nếu muốn lấy lại tiền, hãy rút trước khi xóa.
      tags:
        - Goals
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của mục tiêu cần xóa
      responses:
        '200':
          description: Xóa mục tiêu thành công
          content:
            application/json:
              example:
                status: success
                message: Xóa mục tiêu thành công
        '404':
          description: Không tìm thấy mục tiêu (GOAL_NOT_FOUND)
  /api/goals/{id}/deposit:
    post:
      summary: Nạp tiền vào mục tiêu từ ví cá nhân
      description: >
        Chuyển một khoản tiền từ ví cá nhân vào mục tiêu tiết kiệm.


        **Quy tắc:**

        - `wallet_id` phải là ví cá nhân của chính user (không dùng ví gia đình)

        - Số dư ví phải đủ để nạp

        - Sau khi nạp, số dư ví sẽ bị trừ và `currentAmount` của mục tiêu tăng
        lên

        - Nếu `currentAmount >= targetAmount`, trạng thái tự động chuyển sang
        ACHIEVED
      tags:
        - Goals
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của mục tiêu cần nạp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - wallet_id
              properties:
                amount:
                  type: number
                  minimum: 0.01
                  example: 5000000
                  description: Số tiền muốn nạp (VND)
                wallet_id:
                  type: string
                  format: uuid
                  example: 11111111-1111-1111-1111-111111111111
                  description: UUID ví cá nhân nguồn tiền
            example:
              amount: 5000000
              wallet_id: 11111111-1111-1111-1111-111111111111
      responses:
        '200':
          description: Nạp tiền vào mục tiêu thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      currentAmount:
                        type: number
                      status:
                        type: string
                      sourceWallet:
                        type: object
                        properties:
                          id:
                            type: string
                          balance:
                            type: number
              example:
                status: success
                message: Nạp tiền vào mục tiêu thành công
                data:
                  id: g1a2b3c4-...
                  currentAmount: 17000000
                  status: IN_PROGRESS
                  sourceWallet:
                    id: 11111111-...
                    balance: 8000000
        '403':
          description: Ví không phải ví cá nhân hợp lệ (INVALID_WALLET)
        '404':
          description: Mục tiêu không tồn tại (GOAL_NOT_FOUND)
