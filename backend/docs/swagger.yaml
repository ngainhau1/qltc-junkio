          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    type:
                      type: string
                      enum:
                        - INCOME
                        - EXPENSE
                    icon:
                      type: string
                    parent_id:
                      type: string
                      nullable: true
              example:
                - id: c1a2b3c4-...
                  name: Ăn uống
                  type: EXPENSE
                  icon: Utensils
                  parent_id: null
                - id: c2b3c4d5-...
                  name: Cà phê
                  type: EXPENSE
                  icon: Coffee
                  parent_id: c1a2b3c4-...
                - id: c3c4d5e6-...
                  name: Lương
                  type: INCOME
                  icon: Banknote
                  parent_id: null
    post:
      summary: Tạo danh mục thu/chi mới
      description: >
        Tạo một danh mục mới để phân loại giao dịch.


        **Hướng dẫn:**

        - `name`: Tên danh mục (bắt buộc, VD: "Ăn uống", "Lương")

        - `type`: INCOME (thu nhập) hoặc EXPENSE (chi tiêu)

        - `icon`: Tên icon hiển thị trên giao diện (icon từ thư viện Lucide
        React)

        - `parent_id`: UUID của danh mục cha (để null nếu là danh mục gốc)
      tags:
        - Categories
