openapi: 3.0.0
info:
  title: Junkio Expense Tracker API
  version: 1.0.0
  description: >-
    **Chào mừng đến với thư viện API của Junkio Expense Tracker!**  


    Dưới đây là các tài liệu hướng dẫn sử dụng API chi tiết dành cho Lập trình
    viên, Tester và Admin hệ thống. Thiết kế tuân theo chuẩn RESTful.


    ---

    ###  Hướng dẫn dành cho Người Dùng Mới (Getting Started)


    Nếu bạn là người mới sử dụng API này, hãy làm theo các bước sau để xác thực:


    1. **Đăng nhập (Login):** Go to the `/api/auth/login` route và nhập Email &
    Password.

    2. **Lấy Token:** Copy chuỗi `token` trả về từ kết quả JSON (trong object
    `data`).

    3. **Cấp quyền (Authorize):** Kéo lên trên cùng của trang web này, bấm vào
    nút **Authorize** màu xanh lá cây hoặc click vào biểu tượng 🔒 ở bất kỳ API
    nào, dán chuỗi token vừa copy vào ô **Value** và nhấn **Authorize**.

    4. **Bắt đầu gọi API:** Nhấn `Try it out` ở các endpoint có yêu cầu xác thực
    để thực hiện các yêu cầu (Requests). Server sẽ nhận diện được phiên làm việc
    của bạn.


    > ** Mẹo:** Swagger UI đã được cấu hình lưu lại Token kể cả khi bạn tải lại
    trang (Persist Authorization).


    ---


    ###  Mã Lỗi (Error Codes)

    Junkio API sử dụng hệ thống `Error Codes` chuẩn và thông báo lỗi đa ngôn ngữ
    (i18n). Thay vì đọc chuỗi ký tự thô, Frontend sẽ nhận được các mã như
    `WALLET_NOT_FOUND`, `INSUFFICIENT_BALANCE` và tự thông dịch thành văn bản.
    Bạn có thể xem chi tiết mô hình phản hồi (Response) ở từng route bên dưới.
servers:
  - url: /
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /api/admin/dashboard:
    get:
      summary: Lấy tổng quan hệ thống (Platform Dashboard)
      description: |
        Trả về các chỉ số tổng quan nhanh của toàn hệ thống bao gồm:
        - Tổng số người dùng đăng ký
        - Tổng số giao dịch đã ghi nhận
        - Tổng số nhóm gia đình đang hoạt động
        - Danh sách 5 người dùng đăng ký gần nhất

        API này được gọi khi Admin mở trang Dashboard.
      tags:
        - Admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dữ liệu dashboard admin thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      totalUsers:
                        type: integer
                      totalTransactions:
                        type: integer
                      totalFamilies:
                        type: integer
                      recentUsers:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            email:
                              type: string
                            role:
                              type: string
                              enum:
                                - member
                                - staff
                                - admin
                            createdAt:
                              type: string
                              format: date-time
              example:
                status: success
                message: Lấy dữ liệu Dashboard thành công
                data:
                  totalUsers: 1450
                  totalTransactions: 250000
                  totalFamilies: 35
                  recentUsers:
                    - id: b2df0d5d-1234-4abc-9def-bbbd02910001
                      name: Nguyễn Văn A
                      email: nguyenvana@junkio.com
                      role: member
                      createdAt: '2026-03-30T10:00:00.000Z'
                    - id: c3ef1e6e-5678-4bcd-aef0-ccce13a20002
                      name: Trần Thị B
                      email: tranthib@junkio.com
                      role: member
                      createdAt: '2026-03-29T08:30:00.000Z'
        '401':
          description: Chưa đăng nhập hoặc token hết hạn
        '403':
          description: Không có quyền admin
  /api/admin/analytics:
    get:
      summary: Lấy phân tích dữ liệu toàn hệ thống (System Analytics)
      description: >
        Trả về dữ liệu phân tích chuyên sâu bao gồm:

        - **Thống kê tổng hợp**: Tổng số ví, mục tiêu, ngân sách trên toàn hệ
        thống

        - **Biểu đồ tăng trưởng người dùng** theo từng tháng

        - **Top danh mục chi tiêu** phổ biến nhất

        - **Hoạt động hàng tuần** (số giao dịch mỗi ngày trong tuần gần nhất)


        Dùng để hiển thị biểu đồ trên trang Analytics của Admin Panel.
      tags:
        - Admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dữ liệu analytics thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      stats:
                        type: object
                        properties:
                          totalWallets:
                            type: integer
                          totalGoals:
                            type: integer
                          totalBudgets:
                            type: integer
                      userGrowth:
                        type: array
                        items:
                          type: object
                          properties:
                            month:
                              type: string
                            count:
                              type: integer
                      topCategories:
                        type: array
                        items:
                          type: object
                      weeklyActivity:
                        type: array
                        items:
                          type: object
              example:
                status: success
                message: Lấy analytics thành công
                data:
                  stats:
                    totalWallets: 3200
                    totalGoals: 580
                    totalBudgets: 420
                  userGrowth:
                    - month: 2026-01
                      count: 120
                    - month: 2026-02
                      count: 185
                    - month: 2026-03
                      count: 210
                  topCategories:
                    - name: Ăn uống
                      count: 45000
                    - name: Di chuyển
                      count: 28000
                  weeklyActivity:
                    - day: Mon
                      transactions: 1200
                    - day: Tue
                      transactions: 1350
        '401':
          description: Chưa đăng nhập hoặc token hết hạn
        '403':
          description: Không có quyền admin
  /api/admin/financial-overview:
    get:
      summary: Lấy tổng quan tài chính toàn hệ thống (Financial Overview)
      description: >
        Cung cấp cái nhìn toàn cảnh về tình hình tài chính trên nền tảng:

        - **Tổng số dư hệ thống** (tổng balance của tất cả ví)

        - **Xu hướng thu/chi** theo từng tháng (dùng để vẽ biểu đồ line chart)

        - **Top người chi tiêu nhiều nhất**

        - **Tỷ lệ tuân thủ ngân sách** (% user giữ chi tiêu trong giới hạn
        budget)


        Endpoint này hữu ích để Admin đánh giá sức khỏe tài chính tổng thể.
      tags:
        - Admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tổng quan tài chính thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      systemBalance:
                        type: number
                      revenueTrends:
                        type: array
                        items:
                          type: object
                          properties:
                            month:
                              type: string
                            income:
                              type: number
                            expense:
                              type: number
                      topSpenders:
                        type: array
                        items:
                          type: object
                      budgetCompliance:
                        type: number
              example:
                status: success
                message: Lấy tổng quan tài chính thành công
                data:
                  systemBalance: 15750000000
                  revenueTrends:
                    - month: 2026-01
                      income: 850000000
                      expense: 620000000
                    - month: 2026-02
                      income: 920000000
                      expense: 710000000
                  topSpenders:
                    - name: Nguyễn Văn C
                      totalExpense: 25000000
                    - name: Lê Thị D
                      totalExpense: 18500000
                  budgetCompliance: 72.5
        '401':
          description: Chưa đăng nhập hoặc token hết hạn
        '403':
          description: Không có quyền admin
  /api/admin/users:
    get:
      summary: Lấy danh sách người dùng toàn hệ thống
      description: >
        Trả về danh sách tất cả người dùng có phân trang và bộ lọc.

        - Hỗ trợ tìm kiếm theo tên hoặc email (`search`)

        - Lọc theo role: member, staff, admin hoặc tất cả

        - Lọc theo trạng thái: active (đang hoạt động), locked (bị khóa), hoặc
        tất cả


        Kết quả trả về bao gồm thông tin phân trang (tổng số user, số trang).
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Số trang hiện tại (bắt đầu từ 1)
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Số lượng user mỗi trang (mặc định 20)
        - in: query
          name: search
          schema:
            type: string
          description: Từ khóa tìm kiếm theo tên hoặc email
        - in: query
          name: role
          schema:
            type: string
            enum:
              - all
              - member
              - staff
              - admin
            default: all
          description: Lọc theo vai trò người dùng
        - in: query
          name: status
          schema:
            type: string
            enum:
              - all
              - active
              - locked
            default: all
          description: Lọc theo trạng thái tài khoản
      responses:
        '200':
          description: Danh sách người dùng thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          type: object
                      total:
                        type: integer
                      page:
                        type: integer
                      totalPages:
                        type: integer
              example:
                status: success
                message: Lấy danh sách user thành công
                data:
                  users:
                    - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      name: Admin Junkio
                      email: admin@junkio.com
                      role: admin
                      is_locked: false
                      createdAt: '2026-01-01T00:00:00.000Z'
                    - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                      name: Nguyễn Văn Member
                      email: member@junkio.com
                      role: member
                      is_locked: false
                      createdAt: '2026-02-15T08:30:00.000Z'
                  total: 1450
                  page: 1
                  totalPages: 73
        '401':
          description: Chưa đăng nhập hoặc token hết hạn
        '403':
          description: Không có quyền admin
  /api/admin/users/{id}:
    get:
      summary: Lấy chi tiết một người dùng
      description: >
        Trả về thông tin chi tiết của một user cụ thể, bao gồm:

        - Thông tin cá nhân (tên, email, role, trạng thái khóa)

        - Danh sách ví (wallets) mà user sở hữu

        - Danh sách gia đình (families) mà user tham gia

        - Tổng số giao dịch đã thực hiện


        Admin dùng API này để xem xét hoạt động của một user trước khi quyết
        định khóa/xóa.
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của user cần xem
      responses:
        '200':
          description: Chi tiết user thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
                      is_locked:
                        type: boolean
                      wallets:
                        type: array
                        items:
                          type: object
                      Families:
                        type: array
                        items:
                          type: object
                      transactionCount:
                        type: integer
              example:
                status: success
                message: Lấy chi tiết user thành công
                data:
                  id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                  name: Nguyễn Văn Member
                  email: member@junkio.com
                  role: member
                  is_locked: false
                  wallets:
                    - id: w1a2b3c4-...
                      name: Ví MB Bank
                      balance: 15000000
                  Families:
                    - id: f1a2b3c4-...
                      name: Gia đình Nguyễn
                  transactionCount: 342
        '404':
          description: Không tìm thấy user (USER_NOT_FOUND)
    delete:
      summary: Xóa vĩnh viễn một tài khoản người dùng
      description: |
        Xóa hoàn toàn user khỏi hệ thống. Hành động này **không thể hoàn tác**.
        Dữ liệu liên quan (ví, giao dịch, mục tiêu...) sẽ bị xóa theo.

        **Lưu ý quan trọng:** Admin không thể tự xóa chính mình.
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của user cần xóa
      responses:
        '200':
          description: Xóa user thành công
          content:
            application/json:
              example:
                status: success
                message: Xóa user thành công
        '400':
          description: Không được xóa chính mình (CANNOT_DELETE_SELF)
        '404':
          description: Không tìm thấy user (USER_NOT_FOUND)
  /api/admin/users/{id}/toggle-lock:
    put:
      summary: Khóa hoặc mở khóa tài khoản người dùng
      description: >
        Chuyển đổi trạng thái khóa của một tài khoản:

        - Nếu user đang **active** -> chuyển sang **locked** (không thể đăng
        nhập)

        - Nếu user đang **locked** -> chuyển sang **active** (cho phép đăng nhập
        lại)


        **Lưu ý:** Admin không thể khóa chính mình.

        Khi user bị khóa, token hiện tại vẫn hoạt động cho đến khi hết hạn.
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của user cần khóa/mở khóa
      responses:
        '200':
          description: Thay đổi trạng thái khóa thành công
          content:
            application/json:
              example:
                status: success
                message: Đã khóa tài khoản user
                data:
                  id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                  is_locked: true
        '400':
          description: Không được khóa chính mình (CANNOT_LOCK_SELF)
  /api/admin/users/{id}/role:
    put:
      summary: Thay đổi vai trò (role) của người dùng
      description: |
        Nâng cấp hoặc hạ cấp quyền hạn của một user trong hệ thống.
        Các vai trò hợp lệ:
        - `member`: Người dùng thường (mặc định khi đăng ký)
        - `staff`: Nhân viên hỗ trợ (có quyền xem báo cáo)
        - `admin`: Quản trị viên toàn quyền

        **Lưu ý:** Admin không thể thay đổi role của chính mình.
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của user cần đổi role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  type: string
                  enum:
                    - member
                    - staff
                    - admin
                  example: staff
            example:
              role: staff
      responses:
        '200':
          description: Đổi role thành công
          content:
            application/json:
              example:
                status: success
                message: Đổi role thành công
                data:
                  id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                  role: staff
        '400':
          description: >-
            Role không hợp lệ hoặc đang tự đổi role (INVALID_ROLE /
            CANNOT_CHANGE_OWN_ROLE)
  /api/admin/logs:
    get:
      summary: Lấy nhật ký hệ thống (Audit Logs)
      description: >
        Trả về danh sách các hành động quan trọng đã xảy ra trên hệ thống, bao
        gồm:

        - Đăng nhập / Đăng ký người dùng

        - Tạo / Xóa ví, giao dịch

        - Thay đổi role, khóa tài khoản

        - Các thao tác nhạy cảm khác


        Hỗ trợ phân trang và lọc theo loại hành động (`action`).

        Đây là công cụ quan trọng để Admin theo dõi hoạt động và phát hiện bất
        thường.
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Số trang hiện tại
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
          description: Số bản ghi mỗi trang (mặc định 50)
        - in: query
          name: action
          schema:
            type: string
            default: ALL
          description: >-
            Lọc theo loại hành động (VD USER_LOGIN, USER_REGISTER,
            ROLE_CHANGED). Để ALL để xem tất cả.
      responses:
        '200':
          description: Danh sách audit logs thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      logs:
                        type: array
                        items:
                          type: object
                      total:
                        type: integer
                      page:
                        type: integer
                      totalPages:
                        type: integer
              example:
                status: success
                message: Lấy audit logs thành công
                data:
                  logs:
                    - id: log-001
                      action: USER_LOGIN
                      userId: b2c3d4e5-...
                      details: User đăng nhập thành công
                      createdAt: '2026-03-30T09:15:00.000Z'
                    - id: log-002
                      action: ROLE_CHANGED
                      userId: a1b2c3d4-...
                      details: Đổi role từ member sang staff
                      createdAt: '2026-03-30T08:45:00.000Z'
                  total: 5280
                  page: 1
                  totalPages: 106
        '401':
          description: Chưa đăng nhập hoặc token hết hạn
        '403':
          description: Không có quyền admin
  /api/analytics/dashboard:
    get:
      summary: Lấy số liệu tổng quan tài chính cá nhân
      description: |
        Trả về dữ liệu tổng hợp cho trang Dashboard của người dùng:
        - **Tổng tài sản**: Tổng số dư tất cả ví cá nhân
        - **Thu nhập tháng này**: Tổng INCOME trong tháng hiện tại
        - **Chi tiêu tháng này**: Tổng EXPENSE trong tháng hiện tại
        - **Giao dịch gần đây**: 5-10 giao dịch mới nhất

        API này được gọi mỗi khi người dùng mở trang chủ ứng dụng.
      tags:
        - Analytics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Thống kê dashboard thành công
          content:
            application/json:
              example:
                status: success
                data:
                  totalBalance: 45000000
                  monthlyIncome: 28000000
                  monthlyExpense: 15500000
                  recentTransactions:
                    - id: t1-...
                      amount: 150000
                      type: EXPENSE
                      description: Cà phê buổi sáng
                      date: '2026-03-30'
                    - id: t2-...
                      amount: 25000000
                      type: INCOME
                      description: Lương tháng 3
                      date: '2026-03-28'
  /api/analytics/reports:
    get:
      summary: Lấy dữ liệu báo cáo tài chính theo tháng/năm
      description: |
        Trả về dữ liệu báo cáo chi tiết cho một tháng/năm cụ thể.
        Bao gồm: thống kê thu/chi theo danh mục, biểu đồ xu hướng,
        so sánh với tháng trước.

        Nếu không truyền tham số, mặc định trả về dữ liệu tháng hiện tại.
      tags:
        - Analytics
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: year
          schema:
            type: integer
          description: Năm cần xem báo cáo (VD 2026)
        - in: query
          name: month
          schema:
            type: integer
          description: Tháng cần xem báo cáo (1-12)
      responses:
        '200':
          description: Dữ liệu báo cáo thành công
          content:
            application/json:
              example:
                status: success
                data:
                  year: 2026
                  month: 3
                  totalIncome: 28000000
                  totalExpense: 15500000
                  categoryBreakdown:
                    - category: Ăn uống
                      amount: 4500000
                      percentage: 29
                    - category: Di chuyển
                      amount: 3200000
                      percentage: 21
  /api/auth/register:
    post:
      summary: Đăng ký tài khoản mới
      description: >
        Tạo một tài khoản người dùng mới trên hệ thống Junkio.

        Sau khi đăng ký thành công, người dùng cần **đăng nhập** để nhận JWT
        token.


        **Yêu cầu:**

        - Email phải là duy nhất trên hệ thống

        - Mật khẩu tối thiểu 6 ký tự

        - Tên hiển thị không được để trống
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: Nguyễn Văn A
                  description: Tên hiển thị của người dùng
                email:
                  type: string
                  format: email
                  example: user@junkio.com
                  description: Email đăng nhập (phải là duy nhất)
                password:
                  type: string
                  format: password
                  example: '123456'
                  description: Mật khẩu (tối thiểu 6 ký tự)
            example:
              name: Nguyễn Văn A
              email: user@junkio.com
              password: '123456'
      responses:
        '201':
          description: Đăng ký thành công
          content:
            application/json:
              example:
                status: success
                message: Đăng ký thành công
        '409':
          description: Email đã tồn tại trên hệ thống (EMAIL_EXISTS)
        '422':
          description: Dữ liệu gửi lên không hợp lệ (thiếu field, sai format)
  /api/auth/login:
    post:
      summary: Đăng nhập và nhận JWT access token
      description: >
        Xác thực thông tin đăng nhập và trả về JWT access token.


        **Quy trình sử dụng token:**

        1. Gọi API này với email + password

        2. Copy giá trị `token` từ response

        3. Click nút **Authorize** ở đầu trang Swagger UI

        4. Dán token vào ô Value và nhấn Authorize

        5. Tất cả các API có biểu tượng khóa sẽ tự động gửi kèm token


        **Thông tin token:**

        - Access token hết hạn sau **15 phút**

        - Refresh token được lưu trong cookie HttpOnly, hết hạn sau **7 ngày**

        - Khi access token hết hạn, gọi `/api/auth/refresh-token` để lấy token
        mới
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: demo@junkio.com
                  description: Email đã đăng ký
                password:
                  type: string
                  format: password
                  example: demo123
                  description: Mật khẩu tài khoản
            example:
              email: demo@junkio.com
              password: demo123
      responses:
        '200':
          description: Đăng nhập thành công, trả về token và thông tin user
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Đăng nhập thành công
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: JWT access token (hết hạn sau 15 phút)
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          email:
                            type: string
                          role:
                            type: string
                            enum:
                              - member
                              - staff
                              - admin
              example:
                status: success
                message: Đăng nhập thành công
                data:
                  token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6ImIyZGYw...
                  user:
                    id: b2df0d5d-1234-4abc-9def-bbbd02910001
                    name: Demo User
                    email: demo@junkio.com
                    role: member
        '400':
          description: Email hoặc mật khẩu không đúng (INVALID_CREDENTIALS)
        '423':
          description: Tài khoản đã bị khóa bởi admin (ACCOUNT_LOCKED)
  /api/auth/refresh-token:
    post:
      summary: Làm mới access token từ refresh token cookie
      description: >
        Khi access token hết hạn (sau 15 phút), Frontend tự động gọi API này

        để lấy token mới mà không cần người dùng đăng nhập lại.


        **Cách hoạt động:**

        - Server đọc `refresh_token` từ cookie HttpOnly (tự động gửi kèm bởi
        trình duyệt)

        - Nếu hợp lệ, trả về access token mới

        - Nếu refresh token cũng hết hạn (sau 7 ngày), yêu cầu đăng nhập lại


        **Lưu ý:** API này không cần gửi body, chỉ cần cookie hợp lệ.
      tags:
        - Auth
      security: []
      responses:
        '200':
          description: Làm mới token thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          email:
                            type: string
                          role:
                            type: string
                            enum:
                              - member
                              - staff
                              - admin
              example:
                status: success
                message: Làm mới token thành công
                data:
                  token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.newToken...
                  user:
                    id: b2df0d5d-1234-4abc-9def-bbbd02910001
                    name: Demo User
                    email: demo@junkio.com
                    role: member
        '401':
          description: Không có refresh token trong cookie (REFRESH_TOKEN_MISSING)
        '403':
          description: Refresh token hết hạn hoặc không hợp lệ (REFRESH_TOKEN_EXPIRED)
  /api/auth/logout:
    post:
      summary: Đăng xuất và xóa refresh token
      description: >
        Xóa refresh token cookie khỏi trình duyệt.

        Sau khi gọi API này, access token hiện tại vẫn hoạt động cho đến khi hết
        hạn,

        nhưng không thể làm mới token nữa.


        **Lưu ý:** Frontend nên xóa access token khỏi bộ nhớ local sau khi gọi
        API này.
      tags:
        - Auth
      responses:
        '200':
          description: Đăng xuất thành công
          content:
            application/json:
              example:
                status: success
                message: Đăng xuất thành công
  /api/auth/forgot-password:
    post:
      summary: Gửi email khôi phục mật khẩu
      description: >
        Gửi email chứa link đặt lại mật khẩu đến địa chỉ email đã đăng ký.

        Link khôi phục có hiệu lực trong **10 phút**.


        **Quy trình:**

        1. Người dùng nhập email

        2. Server gửi email chứa token khôi phục

        3. Người dùng click link trong email

        4. Gọi API `/api/auth/reset-password/{token}` với mật khẩu mới


        **Lưu ý:** API luôn trả về thành công để tránh lộ thông tin email nào
        tồn tại.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: user@junkio.com
                  description: Email đã đăng ký trên hệ thống
            example:
              email: user@junkio.com
      responses:
        '200':
          description: Email khôi phục đã được gửi
          content:
            application/json:
              example:
                status: success
                message: Email khôi phục đã được gửi
        '404':
          description: Email không tồn tại trên hệ thống (EMAIL_NOT_FOUND)
  /api/auth/reset-password/{token}:
    post:
      summary: Đặt lại mật khẩu bằng token khôi phục
      description: >
        Thiết lập mật khẩu mới cho tài khoản sử dụng token nhận được qua email.


        **Yêu cầu:**

        - Token phải còn hiệu lực (trong vòng 10 phút kể từ khi gửi)

        - Mật khẩu mới tối thiểu 6 ký tự

        - Mỗi token chỉ sử dụng được **một lần**


        Sau khi đặt lại thành công, người dùng cần đăng nhập lại với mật khẩu
        mới.
      tags:
        - Auth
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
          description: Token khôi phục nhận được qua email (chuỗi hex dài)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  format: password
                  example: newPassword123
                  description: Mật khẩu mới (tối thiểu 6 ký tự)
            example:
              password: newPassword123
      responses:
        '200':
          description: Mật khẩu đã được đặt lại thành công
          content:
            application/json:
              example:
                status: success
                message: Mật khẩu đã được đặt lại thành công
        '400':
          description: Token không hợp lệ hoặc đã hết hạn (INVALID_RESET_TOKEN)
  /api/budgets:
    get:
      summary: Lấy danh sách ngân sách mà user có quyền xem
      description: |
        Trả về toàn bộ ngân sách:
        - **Ngân sách cá nhân** của user
        - **Ngân sách gia đình** thuộc các family mà user là thành viên

        Mỗi budget bao gồm: danh mục, hạn mức, khoảng thời gian, số tiền đã chi.
      tags:
        - Budgets
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách ngân sách thành công
          content:
            application/json:
              example:
                status: success
                message: Lấy danh sách budget thành công
                data:
                  - id: b1a2b3c4-...
                    category_id: c1a2b3c4-...
                    category_name: Ăn uống
                    amount_limit: 3000000
                    spent: 1850000
                    start_date: '2026-03-01'
                    end_date: '2026-03-31'
                    family_id: null
                  - id: b2b3c4d5-...
                    category_id: c2b3c4d5-...
                    category_name: Di chuyển
                    amount_limit: 5000000
                    spent: 2100000
                    start_date: '2026-03-01'
                    end_date: '2026-03-31'
                    family_id: f1a2b3c4-...
    post:
      summary: Tạo ngân sách mới
      description: >
        Tạo một ngân sách mới để giới hạn chi tiêu theo danh mục và thời gian.


        **Hướng dẫn:**

        - Bỏ qua `family_id` (hoặc gửi null) -> Tạo **ngân sách cá nhân**

        - Gửi `family_id` hợp lệ -> Tạo **ngân sách gia đình** (phải là thành
        viên family đó)


        **Ví dụ:** Đặt ngân sách 3 triệu VND cho danh mục "Ăn uống" trong tháng
        3/2026.
      tags:
        - Budgets
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - category_id
                - amount_limit
                - start_date
                - end_date
              properties:
                category_id:
                  type: string
                  format: uuid
                  description: UUID của danh mục chi tiêu
                amount_limit:
                  type: number
                  minimum: 0.01
                  example: 3000000
                  description: Hạn mức chi tiêu (VND)
                start_date:
                  type: string
                  format: date
                  example: '2026-03-01'
                  description: Ngày bắt đầu (YYYY-MM-DD)
                end_date:
                  type: string
                  format: date
                  example: '2026-03-31'
                  description: Ngày kết thúc (YYYY-MM-DD)
                family_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: UUID gia đình (để null nếu là ngân sách cá nhân)
            examples:
              ngan_sach_ca_nhan:
                summary: Tạo ngân sách cá nhân
                value:
                  category_id: 11111111-1111-1111-1111-111111111111
                  amount_limit: 3000000
                  start_date: '2026-03-01'
                  end_date: '2026-03-31'
              ngan_sach_gia_dinh:
                summary: Tạo ngân sách gia đình
                value:
                  category_id: 11111111-1111-1111-1111-111111111111
                  amount_limit: 5000000
                  start_date: '2026-03-01'
                  end_date: '2026-03-31'
                  family_id: 22222222-2222-2222-2222-222222222222
      responses:
        '201':
          description: Tạo ngân sách thành công
          content:
            application/json:
              example:
                status: success
                message: Tạo budget thành công
        '403':
          description: User không thuộc gia đình được chỉ định (NOT_FAMILY_MEMBER)
        '422':
          description: Dữ liệu không hợp lệ
  /api/budgets/{id}:
    put:
      summary: Cập nhật ngân sách
      description: |
        Cập nhật hạn mức, khoảng thời gian hoặc scope của ngân sách.

        **Chuyển đổi scope:**
        - Gửi `family_id: null` -> Chuyển budget về **cá nhân**
        - Gửi `family_id` hợp lệ -> Chuyển sang **gia đình**

        Chỉ gửi các field muốn thay đổi (partial update).
      tags:
        - Budgets
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của ngân sách cần cập nhật
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                category_id:
                  type: string
                  format: uuid
                amount_limit:
                  type: number
                  minimum: 0.01
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                family_id:
                  type: string
                  format: uuid
                  nullable: true
            example:
              amount_limit: 4000000
      responses:
        '200':
          description: Cập nhật ngân sách thành công
          content:
            application/json:
              example:
                status: success
                message: Cập nhật budget thành công
        '404':
          description: Không tìm thấy ngân sách (BUDGET_NOT_FOUND)
    delete:
      summary: Xóa ngân sách
      description: >
        Xóa vĩnh viễn một ngân sách. Hành động này không ảnh hưởng đến các giao
        dịch

        đã thực hiện trước đó, chỉ xóa bỏ giới hạn theo dõi chi tiêu.
      tags:
        - Budgets
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID của ngân sách cần xóa
      responses:
        '200':
          description: Xóa ngân sách thành công
          content:
            application/json:
              example:
                status: success
                message: Xóa budget thành công
        '404':
          description: Không tìm thấy ngân sách (BUDGET_NOT_FOUND)
  /api/categories:
    get:
      summary: Lấy danh sách tất cả danh mục
      description: |
        Trả về toàn bộ danh mục thu/chi có sẵn trong hệ thống.
        Danh mục được chia thành 2 loại:
        - **INCOME**: Danh mục thu nhập (VD: Lương, Thưởng, Đầu tư)
        - **EXPENSE**: Danh mục chi tiêu (VD: Ăn uống, Di chuyển, Giải trí)

        Mỗi danh mục có thể có `parent_id` trỏ đến danh mục cha (cấu trúc cây).
      tags:
