        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                  example: Ăn uống
                  description: Tên danh mục
                type:
                  type: string
                  enum:
                    - INCOME
                    - EXPENSE
                  example: EXPENSE
                  description: Loại danh mục
                parent_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: UUID danh mục cha (để trống nếu là gốc)
                icon:
                  type: string
                  example: Utensils
                  description: Tên icon Lucide React
            examples:
              danh_muc_goc:
                summary: Tạo danh mục gốc (chi tiêu)
                value:
                  name: Giải trí
                  type: EXPENSE
                  icon: Gamepad2
              danh_muc_con:
                summary: Tạo danh mục con
                value:
                  name: Xem phim
                  type: EXPENSE
                  icon: Film
                  parent_id: c1a2b3c4-uuid-cua-danh-muc-cha
      responses:
        '201':
          description: Tạo danh mục thành công
          content:
            application/json:
              example:
                status: success
                message: Tạo danh mục thành công
                data:
                  id: c-new-category-id
                  name: Giải trí
                  type: EXPENSE
                  icon: Gamepad2
                  parent_id: null
        '400':
          description: Dữ liệu không hợp lệ (thiếu name hoặc type)
  /api/categories/{id}:
    put:
      summary: Cập nhật thông tin danh mục
      description: |
        Thay đổi tên, loại hoặc icon của một danh mục hiện có.
        Chỉ gửi các field muốn cập nhật (partial update).

